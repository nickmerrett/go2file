<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=yes, initial-scale=1, maximum-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="apple-touch-icon" href="https://alexxit.github.io/go2rtc/icons/apple-touch-icon-180x180.png" sizes="180x180">
    <link rel="icon" href="https://alexxit.github.io/go2rtc/icons/favicon.ico">
    <link rel="manifest" href="https://alexxit.github.io/go2rtc/manifest.json">
    <title>go2file</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        table tbody td {
            font-size: 13px;
        }

        label {
            display: flex;
            align-items: center;
        }

        .controls {
            display: flex;
            padding: 5px;
        }

        .controls > label {
            margin-left: 10px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
            font-weight: bold;
        }
        .badge-stream   { background: #d4edda; color: #155724; }
        .badge-rec      { background: #cce5ff; color: #004085; }
        .badge-both     { background: #fff3cd; color: #856404; }
        .badge-error    { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<script src="main.js"></script>
<div class="info"></div>
<div class="controls">
    <button>stream</button>
    <label><input type="checkbox" name="webrtc" checked>webrtc</label>
    <label><input type="checkbox" name="mse" checked>mse</label>
    <label><input type="checkbox" name="hls" checked>hls</label>
    <label><input type="checkbox" name="mjpeg" checked>mjpeg</label>
</div>
<table>
    <thead>
    <tr>
        <th><label><input id="selectall" type="checkbox">Name</label></th>
        <th>Online</th>
        <th>Commands</th>
    </tr>
    </thead>
    <tbody id="streams">
    </tbody>
</table>
<script>
    document.querySelector('.controls > button')
        .addEventListener('click', () => {
            const url = new URL('stream.html', location.href);

            const streams = document.querySelectorAll('#streams input');
            streams.forEach(i => {
                if (i.checked) url.searchParams.append('src', i.name);
            });

            if (!url.searchParams.has('src')) return;

            let mode = document.querySelectorAll('.controls input');
            mode = Array.from(mode).filter(i => i.checked).map(i => i.name).join(',');

            window.location.href = `${url}&mode=${mode}`;
        });

    const tbody = document.getElementById('streams');
    tbody.addEventListener('click', async ev => {
        const action = ev.target.dataset.action;

        if (action === 'start-rec') {
            ev.preventDefault();
            const name = decodeURIComponent(ev.target.dataset.name);
            const url = new URL('api/record', location.href);
            url.searchParams.set('src', name);
            await fetch(url, {method: 'POST'}).catch(console.error);
            reload();
            return;
        }

        if (action === 'stop-rec') {
            ev.preventDefault();
            const name = decodeURIComponent(ev.target.dataset.name);
            const url = new URL('api/record', location.href);
            url.searchParams.set('src', name);
            await fetch(url, {method: 'DELETE'}).catch(console.error);
            reload();
            return;
        }

        if (action === 'analyze') {
            ev.preventDefault();
            const name = decodeURIComponent(ev.target.dataset.name);
            const url = new URL('api/detection/analyze', location.href);
            url.searchParams.set('stream', name);
            await fetch(url, {method: 'POST'}).catch(console.error);
            ev.target.textContent = 'queued';
            setTimeout(() => { ev.target.textContent = 'analyze'; }, 2000);
            return;
        }

        if (ev.target.innerText !== 'delete') return;

        ev.preventDefault();

        const src = decodeURIComponent(ev.target.dataset.name);

        const message = `Please type the name of the stream "${src}" to confirm its deletion from the configuration. This action is irreversible.`;
        if (prompt(message) !== src) {
            alert('Stream name does not match. Deletion cancelled.');
            return;
        }

        const url = new URL('api/streams', location.href);
        url.searchParams.set('src', src);

        try {
            await fetch(url, {method: 'DELETE'});
            reload();
        } catch (error) {
            console.error('Failed to delete the stream:', error);
        }
    });

    document.getElementById('selectall').addEventListener('change', ev => {
        document.querySelectorAll('#streams input').forEach(el => {
            el.checked = ev.target.checked;
        });
    });

    function reload() {
        const checkboxStates = {};
        tbody.querySelectorAll('input[type="checkbox"][name]').forEach(checkbox => {
            checkboxStates[checkbox.name] = checkbox.checked;
        });

        Promise.all([
            fetch(new URL('api/streams', location.href), {cache: 'no-cache'}).then(r => r.json()).catch(() => ({})),
            fetch(new URL('api/record/configured', location.href), {cache: 'no-cache'}).then(r => r.json()).catch(() => []),
            fetch(new URL('api/record', location.href), {cache: 'no-cache'}).then(r => r.json()).catch(() => ({})),
            fetch(new URL('api/record/errors', location.href), {cache: 'no-cache'}).then(r => r.json()).catch(() => ({})),
        ]).then(([streamsData, recordingNames, activeRecordings, recordingErrors]) => {
            // Build set of stream names with an active recording process
            const activeRecordingStreams = new Set(
                Object.values(activeRecordings || {}).map(r => r.stream || r.Stream).filter(Boolean)
            );
            // Build merged set: all names from both sources
            const allNames = new Set([
                ...Object.keys(streamsData),
                ...(Array.isArray(recordingNames) ? recordingNames : []),
            ]);

            const existingIds = Array.from(tbody.querySelectorAll('tr')).map(tr => tr.dataset['id']);
            const fetchedIds = [];

            allNames.forEach(key => {
                const name = key.replace(/[<">]/g, '');
                fetchedIds.push(name);

                const streamInfo = streamsData[name];
                const isLive = !!streamInfo;
                const isRecording = Array.isArray(recordingNames) && recordingNames.includes(key);
                const online = isLive && streamInfo.consumers ? streamInfo.consumers.length : null;
                const src = encodeURIComponent(name);

                let badge;
                if (isLive && isRecording) {
                    badge = '<span class="badge badge-both">stream+rec</span>';
                } else if (isLive) {
                    badge = '<span class="badge badge-stream">stream</span>';
                } else {
                    badge = '<span class="badge badge-rec">rec</span>';
                }

                let tr = tbody.querySelector(`tr[data-id="${name}"]`);
                if (!tr) {
                    tr = document.createElement('tr');
                    tr.dataset['id'] = name;
                    tbody.appendChild(tr);
                }

                const isChecked = checkboxStates[name] ? 'checked' : '';

                const isActiveRec = activeRecordingStreams.has(name);

                const streamErr = recordingErrors && recordingErrors[name];

                let onlineCell;
                if (isLive) {
                    onlineCell = `<a href="api/streams?src=${src}">${online} / info</a> / <a href="api/streams?src=${src}&video=all&audio=all&microphone">probe</a> / <a href="network.html?src=${src}">net</a>`;
                } else {
                    let recStatus;
                    if (streamErr) {
                        const errText = streamErr.error.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        recStatus = `<span style="color:#dc3545" title="${errText}">&#9679; error: ${errText}</span>`;
                    } else if (isActiveRec) {
                        recStatus = `<span style="color:#28a745">&#9679; recording</span>`;
                    } else {
                        recStatus = `<span style="color:#999">&#9675; idle</span>`;
                    }
                    onlineCell = `${recStatus} / <a href="api/record?src=${src}">info</a>`;
                }

                let links = [];
                if (isLive) {
                    links.push(`<a href="stream.html?src=${src}">stream</a>`);
                    links.push(`<a href="links.html?src=${src}">links</a>`);
                }
                links.push(`<a href="recordings.html?stream=${src}">recordings</a>`);
                if (!isLive) {
                    if (isActiveRec) {
                        links.push(`<a href="#" data-action="stop-rec" data-name="${name}">stop</a>`);
                    } else {
                        links.push(`<a href="#" data-action="start-rec" data-name="${name}">start</a>`);
                    }
                    links.push(`<a href="#" data-action="analyze" data-name="${name}">analyze</a>`);
                }
                if (isLive) {
                    links.push(`<a href="#" data-name="${src}">delete</a>`);
                }

                const checkboxCell = isLive
                    ? `<label><input type="checkbox" name="${name}" ${isChecked}>${name}${badge}</label>`
                    : `<label style="color:#999">${name}${badge}</label>`;

                tr.innerHTML =
                    `<td>${checkboxCell}</td>` +
                    `<td>${onlineCell}</td>` +
                    `<td>${links.join(' ')}</td>`;
            });

            // Remove stale rows
            existingIds.forEach(id => {
                if (!fetchedIds.includes(id)) {
                    const trToRemove = tbody.querySelector(`tr[data-id="${id}"]`);
                    if (trToRemove) tbody.removeChild(trToRemove);
                }
            });
        });
    }

    // Auto-reload
    setInterval(reload, 5000);

    const url = new URL('api', location.href);
    fetch(url, {cache: 'no-cache'}).then(r => r.json()).then(data => {
        const info = document.querySelector('.info');
        info.innerText = `Version: ${data.version}, Config: ${data.config_path}`;
    });

    reload();
</script>
</body>
</html>
